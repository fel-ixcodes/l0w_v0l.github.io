<!-- SETTINGS PANEL -->

<div class="settings-panel" id="settingsPanel">

    <div class="settings-header">

        <h2>Settings</h2>

        <button class="close-btn" onclick="toggleSettings()">
            ✕
        </button>

    </div>

    <!-- TAB CLOAK -->

    <div class="module">

        <button
            class="module-header"
            onclick="toggleDropdown('cloakDropdown')"
        >

            <span>Tab Cloak</span>

            <span class="dropdown-arrow">⌄</span>

        </button>

        <div
            class="module-dropdown"
            id="cloakDropdown"
        >

            <div class="setting">

                <label>Tab Title</label>

                <input
                    type="text"
                    id="tabTitle"
                    placeholder="Google Classroom"
                >

            </div>

            <div class="setting">

                <label>Tab Icon</label>

                <select id="tabIcon">

                    <option value="classroom">
                        Google Classroom
                    </option>

                    <option value="google">
                        Google
                    </option>

                    <option value="drive">
                        Google Drive
                    </option>

                    <option value="docs">
                        Google Docs
                    </option>

                </select>

            </div>

        </div>

    </div>

    <!-- BACKGROUND EFFECTS -->

    <div class="module">

        <button
            class="module-header"
            onclick="toggleDropdown('effectsDropdown')"
        >

            <span>Background Effects</span>

            <span class="dropdown-arrow">⌄</span>

        </button>

        <div
            class="module-dropdown"
            id="effectsDropdown"
        >

            <div class="setting">

                <label>Effects Mode</label>

                <select id="effectMode">

                    <option value="rain">
                        Rain
                    </option>

                    <option value="particles">
                        Particles
                    </option>

                    <option value="off">
                        Off
                    </option>

                </select>

            </div>

        </div>

    </div>

    <!-- APPLY -->

    <button
        class="apply-btn"
        onclick="applySettings()"
    >

        Apply Settings

    </button>

</div>
