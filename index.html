<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>l0w_v0!ume</title>

<link rel="stylesheet" href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
rel="stylesheet"
>

</head>
<body>

<!-- INTRO -->

<div id="intro">

    <h1 id="introText">
        l0w_v0!ume
    </h1>

</div>

<!-- EFFECTS -->

<canvas id="bgCanvas"></canvas>

<!-- MAIN -->

<div class="main">

    <h1 class="logo">
        l0w_v0!ume
    </h1>

    <div class="searchBar">

        <input
            type="text"
            id="searchInput"
            placeholder="Search..."
        >

        <button id="searchBtn">
            Search
        </button>

    </div>

    <button id="settingsButton">
        Settings
    </button>

</div>

<!-- SETTINGS -->

<div id="settingsPanel">

    <div class="settingsTop">

        <h2>
            Settings
        </h2>

        <button id="closeSettings">
            ✕
        </button>

    </div>

    <div class="settingGroup">

        <label>
            Background Effect
        </label>

        <select id="effectSelect">

            <option value="rain">
                Rain
            </option>

            <option value="particles">
                Particles
            </option>

            <option value="off">
                Off
            </option>

        </select>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
